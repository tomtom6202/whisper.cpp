name: 自動打包 Android APK

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 取得程式碼
      uses: actions/checkout@v4

    - name: 設定 Java 環境 (JDK 17)
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 📥 下載 small 中文模型並強制塞入 APK
      run: |
        mkdir -p examples/whisper.android/app/src/main/assets/models
        rm -f examples/whisper.android/app/src/main/assets/models/*.bin
        wget https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-small.bin -O examples/whisper.android/app/src/main/assets/models/ggml-small.bin

    - name: 🧠 系統級注入：強制寫入中文、八核心與專有名詞設定
      run: |
        JNI_FILE="examples/whisper.android/lib/src/main/jni/whisper/jni.c"
        # 讓系統自動去 C 語言底層尋找設定參數的位置，並安全地插入你的專屬代碼
        awk '/whisper_full_default_params/ {
          print $0
          print "    params.language = \"zh\";"
          print "    params.initial_prompt = \"這是一段召會聚會的錄音，內容包含：阿們、恢復本聖經、職事、晨興、申言、操練靈、享受主、弟兄姊妹、小排、特會、訓練、相調、神人生活。\";"
          print "    params.n_threads = 8;"
          print "    params.entropy_thold = 2.4f;"
          print "    params.logprob_thold = -1.0f;"
          next
        }1' $JNI_FILE > tmp.c && mv tmp.c $JNI_FILE

    - name: ⚙️ 編譯 Android APK
      working-directory: ./examples/whisper.android
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: 📦 將生成的 APK 上傳供下載
      uses: actions/upload-artifact@v4
      with:
        name: Whisper-聚會錄音版-small模型-APK
        path: examples/whisper.android/app/build/outputs/apk/debug/app-debug.apk
