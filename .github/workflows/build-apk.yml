name: 自動打包 Android APK

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 取得程式碼
      uses: actions/checkout@v4

    - name: 設定 Java 環境 (JDK 17)
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 下載 Whisper 基礎模型 (為了讓 App 能編譯)
      run: |
        cd models
        bash ./download-ggml-model.sh base.en
        cd ..

    - name: 編譯 Android APK
      working-directory: ./examples/whisper.android
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: 將生成的 APK 上傳供下載
      uses: actions/upload-artifact@v4
      with:
        name: Whisper-聚會錄音版-APK
        path: examples/whisper.android/app/build/outputs/apk/debug/app-debug.apk
