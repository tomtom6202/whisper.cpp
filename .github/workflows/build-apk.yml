name: 自動打包 Android APK

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 取得程式碼
      uses: actions/checkout@v4

    - name: 設定 Java 環境 (JDK 17)
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 📥 下載中文通用模型並強制塞入 APK
      run: |
        # 1. 建立 Android 專屬的資源資料夾
        mkdir -p examples/whisper.android/app/src/main/assets/models
        # 2. 清除裡面可能壞掉的舊檔案
        rm -f examples/whisper.android/app/src/main/assets/models/*.bin
        # 3. 直接從官方庫下載支援多國語言的 base 模型
        wget https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base.bin -O examples/whisper.android/app/src/main/assets/models/ggml-base.bin

    - name: ⚙️ 編譯 Android APK
      working-directory: ./examples/whisper.android
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: 📦 將生成的 APK 上傳供下載
      uses: actions/upload-artifact@v4
      with:
        name: Whisper-聚會錄音版-APK
        path: examples/whisper.android/app/build/outputs/apk/debug/app-debug.apk
